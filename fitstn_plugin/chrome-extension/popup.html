<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 280px; padding: 16px; font-family: Arial, sans-serif; margin: 0; }
        h2 { font-size: 16px; margin-top: 0; color: #333; text-align: center; }
        input { width: 100%; padding: 8px; margin: 6px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 13px; }
        .btn { width: 100%; padding: 10px; color: #fff; border: none; border-radius: 4px; cursor: pointer; margin-top: 8px; font-size: 14px; }
        .btn-primary { background: #333; }
        .btn-primary:hover { background: #555; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .error { color: #dc3545; font-size: 12px; margin-top: 8px; display: none; text-align: center; }
        .signed-in { text-align: center; }
        .signed-in p { color: #333; font-size: 14px; margin: 12px 0; }
        .signed-in strong { display: block; margin-top: 4px; }
        #login-section, #signed-in-section { display: none; }
        .status-indicator { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; margin: 8px 0; }
        .status-active { background: #d4edda; color: #155724; }
        .status-idle { background: #fff3cd; color: #856404; }
        .status-off_shift { background: #e2e3e5; color: #383d41; }
        .status-detail { font-size: 11px; color: #888; margin: 4px 0 0; }
    </style>
</head>
<body>
    <div id="login-section">
        <h2>FlexCoach Agent Sign In</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn btn-primary" id="signin-btn">Sign In</button>
        <div class="error" id="error-msg"></div>
    </div>
    <div id="signed-in-section" class="signed-in">
        <h2>FlexCoach Agent</h2>
        <p>Signed in as:<strong id="agent-email"></strong></p>
        <button class="btn btn-danger" id="signout-btn" style="margin-top:8px;">Sign Out</button>
    </div>
    <script src="popup.js"></script>
</body>
</html>
